<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
/* ============================================================
   THEME — colors and scale
   ============================================================ */
:root {
	--fs-2xs: 10px;
	--fs-xs:  11px;
	--fs-sm:  12px;
	--fs-md:  14px;
	--fs-lg:  20px;
	--fs-xl:  32px;
	--fs-2xl: 42px;
	--fs-3xl: 60px;

	--bg:      #020404;
	--panel:   #061010;
	--border:  #1a3a3a;
	--border2: #2a5a5a;
	--text:    #8ababa;
	--dim:     #2a5a5a;
	--muted:   #1a3a3a;
	--green:   #4abe7a;
	--amber:   #d8a64e;
	--cyan:    #4abacc;
	--red:     #dd5555;
	--blue:    #5a8add;
	--bar-bg:  #0e2020;

	--dbg-body:       var(--bg);
	--dbg-hud:        var(--panel);
	--dbg-player:     var(--panel);
	--dbg-waqueue:    var(--panel);
	--dbg-recommend:  var(--panel);
	--dbg-difflog:    var(--panel);
	--dbg-tagrate:    var(--panel);
	--dbg-compare:    var(--panel);
	--dbg-skillgraph: var(--panel);
	--dbg-streak:     var(--panel);
	--dbg-speed:      var(--panel);
	--dbg-bottom:     var(--bg);
	--dbg-insight:    var(--panel);
	--dbg-achieve:    var(--panel);
	--dbg-main:       var(--bg);
	--dbg-colright2:  var(--bg);
}

/* ============================================================
   LAYOUT
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); width: 100%; height: 100%; overflow: hidden; }
body {
	background: var(--bg);
	width: 100%;
	height: 100%;
	overflow: hidden;
	font-family: monospace;
	color: var(--text);
	-webkit-font-smoothing: antialiased;
	display: grid;
	grid-template-rows: 4% 96%;
	gap: 6px;
	padding: 3px;
	min-width: 0;
	min-height: 0;
	background: var(--dbg-body);
}

.main {
	display: grid;
	grid-template-columns: 15% 1fr;
	grid-template-rows: 1fr;
	background: var(--dbg-main);
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}

.col-left { display: flex; flex-direction: column; gap: 6px; min-height: 0; overflow: hidden; }
.col-right {
	display: grid;
	grid-template-rows: 3fr 2fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.col-right-top {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.col-right-bottom {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.bottom    { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--dbg-bottom); }

/* ============================================================
   COMPONENTS — panel
   ============================================================ */
.panel { background: var(--panel); border: 0.5px solid var(--border); position: relative; overflow: hidden; }
.panel[data-label]::before { content: attr(data-label); position: absolute; top: 0; left: 0; font-size: var(--fs-xs); color: var(--muted); letter-spacing: .12em; padding: 2px 6px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); background: var(--bg); z-index: 1; white-space: nowrap; }
.panel-inner { padding: 48px 24px 12px; height: 100%; display: flex; flex-direction: column; gap: 8px; }
.panel.accent-green { border-color: #2a6a3a !important; box-shadow: inset 3px 0 0 var(--green); }
.panel.accent-amber { border-color: #6a3a00 !important; box-shadow: inset 3px 0 0 var(--amber); }
.panel.accent-cyan  { border-color: #2a4a6a !important; box-shadow: inset 3px 0 0 var(--cyan); }

/* ============================================================
   COMPONENTS — HUD
   ============================================================ */
.hud { background: var(--panel); border: 0.5px solid var(--border); display: flex; align-items: stretch; overflow: hidden; justify-content: space-between; }
.hud-section { display: flex; flex-direction: column; justify-content: flex-start; padding: 1px 6px; border-right: 0.5px solid var(--border); min-width: 0; flex: 1; }
.hud-label { font-size: var(--fs-sm); color: #8aaa9a; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 1px; text-align: left; }
.hud-value { font-size: var(--fs-lg); font-weight: 500; line-height: 1.1; white-space: nowrap; text-align: center; }
.hud-sub { font-size: var(--fs-xs); color: var(--dim); }
.hud-spacer { flex: 1; }
.hud-boss { display: flex; align-items: center; gap: 8px; padding: 0 12px; background: #060800; border-left: 0.5px solid #2a1800; flex-shrink: 0; }
.hud-boss-timer { font-size: var(--fs-xl); font-weight: 500; color: #ffb030; }

/* ============================================================
   COMPONENTS — Player Status
   ============================================================ */
.ps-rating  { font-size: var(--fs-3xl); font-weight: 500; color: var(--amber); line-height: 1; }
.ps-level   { font-size: var(--fs-xl); font-weight: 500; color: var(--cyan); line-height: 1; }
.ps-xp      { font-size: var(--fs-2xl); font-weight: 500; color: var(--green); line-height: 1; }
.ps-streak  { font-size: var(--fs-xl); font-weight: 500; color: #ff8030; line-height: 1; }
.ps-box-green { background: #040c04; border: 0.5px solid #0a2a0a; padding: 4px 6px; }
.ps-box-amber { display: flex; align-items: center; gap: 4px; background: #060800; border: 0.5px solid #2a1800; padding: 4px 6px; }
.progress-bar { background: var(--bar-bg); height: 20px; width: 100%; overflow: hidden; border: 2px solid var(--border); }
.progress-fill { height: 100%; }

/* ============================================================
   COMPONENTS — Tags, WA, Peers, Contest, Speed, Streak, Quality
   ============================================================ */
.section-label { font-size: var(--fs-xs); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; border-bottom: 0.5px solid var(--border); padding-bottom: 2px; }
.badge { font-size: var(--fs-2xs); padding: 1px 4px; font-weight: 500; }
.badge-green { background: #040e06; color: var(--green); border: 0.5px solid #0a2a0a; }
.badge-amber { background: #0c0600; color: var(--amber); border: 0.5px solid #2a1400; }
.badge-cyan  { background: #03080c; color: var(--cyan); border: 0.5px solid #0a2030; }

.tag-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.tag-row.active { border-left: 2px solid var(--green); padding-left: 3px; background: #030a04; }
.tag-name { font-size: var(--fs-md); color: var(--dim); min-width: 52px; }
.tag-bar { flex: 1; height: 40px; background: var(--bar-bg); overflow: hidden; border-radius: 8px; }
.tag-bar-fill { height: 100%; }
.tag-pct { font-size: var(--fs-md); min-width: 30px; text-align: right; }

.wa-item { display: flex; gap: 4px; align-items: center; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.wa-item:last-child { border-bottom: none; }
.wa-indicator { width: 3px; flex-shrink: 0; align-self: stretch; }
.wa-badge { font-size: var(--fs-xs); padding: 1px 3px; background: #1a0808; color: #aa4444; border: 0.5px solid #3a1010; flex-shrink: 0; }
.wa-name { font-size: var(--fs-md); color: #6a6a6a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wa-tag { font-size: var(--fs-xs); color: var(--dim); margin-right: 2px; }
.wa-diff { font-size: var(--fs-sm); color: var(--muted); }

.peer-row { display: grid; grid-template-columns: 1fr 32px 32px; gap: 2px; align-items: center; padding: 3px 2px; border-bottom: 0.5px solid var(--border); font-size: var(--fs-md); }
.peer-row:last-child { border-bottom: none; }
.peer-self { background: #030a04; border-left: 2px solid #1a4a1a; padding-left: 4px; }
.peer-num { text-align: right; }

.contest-item { display: flex; align-items: center; gap: 4px; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.contest-item:last-child { border-bottom: none; }
.contest-badge { font-size: var(--fs-xs); padding: 1px 3px; border: 0.5px solid; min-width: 24px; text-align: center; flex-shrink: 0; }
.contest-badge-abc { background: #030c03; color: var(--green); border-color: #0a2a0a; }
.contest-badge-arc { background: #0c0800; color: var(--amber); border-color: #2a1800; }
.contest-badge-ahc { background: #03030c; color: var(--blue); border-color: #0a0a2a; }
.contest-name { font-size: var(--fs-md); color: #6a8a8a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contest-time { font-size: var(--fs-sm); color: var(--muted); }
.contest-rated { font-size: var(--fs-xs); color: var(--dim); text-align: right; flex-shrink: 0; }
.contest-rated.yes { color: var(--green) !important; }

.speed-row { display: flex; align-items: center; gap: 4px; padding: 2px; }
.speed-row.active { border-left: 2px solid var(--cyan); padding-left: 4px; background: #04080c; }
.speed-label { font-size: var(--fs-sm); color: var(--dim); min-width: 22px; }
.speed-bar { flex: 1; height: 48px; background: #0a1010; overflow: hidden; }
.speed-bar-fill { height: 100%; display: flex; align-items: center; padding-left: 3px; }
.speed-bar-text { font-size: var(--fs-xs); color: #060808; font-weight: 500; }
.speed-value { font-size: var(--fs-sm); min-width: 32px; text-align: right; }

.streak-grid { display: grid; grid-template-rows: repeat(7,1fr); grid-auto-flow: column; grid-auto-columns: 1fr; gap: 2px; }
.streak-cell { aspect-ratio: 1; border-radius: 50%; max-width: 14px; max-height: 14px; }
.streak-none { background: #0c1818; }
.streak-today { outline: 2px solid var(--cyan); outline-offset: 1px; }

.quality-bar { display: flex; height: 40px; gap: 4px; overflow: hidden; }
.quality-seg { height: 100%; }

.quest-card { background: var(--panel); border: 0.5px solid var(--border); padding: 4px 6px; display: flex; align-items: center; gap: 4px; overflow: hidden; }
.quest-card.review { border-color: #0a2a0a; background: #030a03; box-shadow: inset 2px 0 0 var(--green); }
.quest-card.boss { border-color: #2a1800; background: #060800; }
.quest-title { font-size: var(--fs-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-detail { font-size: var(--fs-2xs); color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-xp { font-size: var(--fs-sm); color: var(--green); font-weight: 500; white-space: nowrap; }

.insight-box { background: var(--panel); border: 0.5px solid #0a2a14; box-shadow: inset 2px 0 0 var(--green); padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 60px; }
.insight-text { font-size: var(--fs-md); color: #3a8a5a; line-height: 1.3; }

.achievement-bar { background: var(--panel); border: 0.5px solid var(--border); padding: 3px 6px; display: flex; align-items: center; gap: 6px; }
.achievement-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 6px; flex: 1; }
.achievement-item { background: #040c0c; border: 0.5px solid var(--border); padding: 2px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.achievement-item.gold { background: #080600; border-color: #1a1000; }
.achievement-item.fresh { border-color: var(--green) !important; }
.achievement-item.locked { opacity: 0.2; }
.achievement-icon { font-size: var(--fs-md); line-height: 1; }
.achievement-label { font-size: var(--fs-2xs); text-align: center; color: var(--muted); line-height: 1.1; }
</style>
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/panels.js"></script>
<script src="js/difficulty-log.js"></script>
<script src="js/streak.js"></script>
<script src="js/skill-graph.js"></script>
<script src="js/hydrate.js"></script>
</body>
</html>
