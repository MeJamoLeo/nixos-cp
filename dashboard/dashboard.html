<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
/* ============================================================
   THEME вҖ” colors and scale
   ============================================================ */
:root {
	--fs-2xs: 7px;
	--fs-xs:  8px;
	--fs-sm:  9px;
	--fs-md:  11px;
	--fs-lg:  14px;
	--fs-xl:  20px;
	--fs-2xl: 26px;
	--fs-3xl: 34px;

	--bg:      #020404;
	--panel:   #061010;
	--border:  #1a3a3a;
	--border2: #2a5a5a;
	--text:    #8ababa;
	--dim:     #2a5a5a;
	--muted:   #1a3a3a;
	--green:   #4abe7a;
	--amber:   #d8a64e;
	--cyan:    #4abacc;
	--red:     #dd5555;
	--blue:    #5a8add;
	--bar-bg:  #0e2020;
}

/* ============================================================
   LAYOUT
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); width: 100%; height: 100%; overflow: hidden; }
body {
	background: var(--bg);
	width: 100%;
	height: 100%;
	overflow: hidden;
	font-family: monospace;
	color: var(--text);
	display: grid;
	grid-template-rows: 44px 1fr 78px;
	gap: 3px;
	padding: 3px;
	min-width: 0;
	min-height: 0;
}

.main {
	display: grid;
	grid-template-columns: 17% 1fr 29%;
	grid-template-rows: 3fr 2fr;
	gap: 3px;
	min-height: 0;
	overflow: hidden;
}

.col-left  { grid-row: 1/3; display: flex; flex-direction: column; gap: 3px; min-height: 0; overflow: hidden; }
.col-right { grid-row: 1/3; display: flex; flex-direction: column; gap: 3px; min-height: 0; overflow: hidden; }
.bottom    { display: grid; grid-template-columns: repeat(3,1fr) 1.4fr; gap: 3px; }

/* ============================================================
   COMPONENTS вҖ” panel
   ============================================================ */
.panel { background: var(--panel); border: 0.5px solid var(--border); position: relative; overflow: hidden; }
.panel[data-label]::before { content: attr(data-label); position: absolute; top: 0; left: 0; font-size: var(--fs-xs); color: var(--muted); letter-spacing: .12em; padding: 2px 6px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); background: var(--bg); z-index: 1; white-space: nowrap; }
.panel-inner { padding: 16px 8px 4px; height: 100%; display: flex; flex-direction: column; gap: 2px; }
.panel.accent-green { border-color: #2a6a3a !important; box-shadow: inset 3px 0 0 var(--green); }
.panel.accent-amber { border-color: #6a3a00 !important; box-shadow: inset 3px 0 0 var(--amber); }
.panel.accent-cyan  { border-color: #2a4a6a !important; box-shadow: inset 3px 0 0 var(--cyan); }

/* ============================================================
   COMPONENTS вҖ” HUD
   ============================================================ */
.hud { background: var(--panel); border: 0.5px solid var(--border); display: flex; align-items: stretch; overflow: hidden; }
.hud-section { display: flex; flex-direction: column; justify-content: center; padding: 0 6px; border-right: 0.5px solid var(--border); min-width: 0; flex-shrink: 0; }
.hud-label { font-size: var(--fs-xs); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
.hud-value { font-size: var(--fs-lg); font-weight: 500; line-height: 1.1; white-space: nowrap; }
.hud-sub { font-size: var(--fs-sm); color: var(--dim); }
.hud-spacer { flex: 1; }
.hud-boss { display: flex; align-items: center; gap: 8px; padding: 0 10px; background: #060800; border-left: 0.5px solid #2a1800; }
.hud-boss-timer { font-size: var(--fs-xl); font-weight: 500; color: #ffb030; }

/* ============================================================
   COMPONENTS вҖ” Player Status
   ============================================================ */
.ps-rating  { font-size: var(--fs-3xl); font-weight: 500; color: var(--amber); line-height: 1; }
.ps-level   { font-size: var(--fs-xl); font-weight: 500; color: var(--cyan); line-height: 1; }
.ps-xp      { font-size: var(--fs-2xl); font-weight: 500; color: var(--green); line-height: 1; }
.ps-streak  { font-size: var(--fs-xl); font-weight: 500; color: #ff8030; line-height: 1; }
.ps-box-green { background: #040c04; border: 0.5px solid #0a2a0a; padding: 4px 6px; }
.ps-box-amber { display: flex; align-items: center; gap: 4px; background: #060800; border: 0.5px solid #2a1800; padding: 4px 6px; }
.progress-bar { background: var(--bar-bg); height: 5px; width: 100%; overflow: hidden; border: 0.5px solid var(--border); }
.progress-fill { height: 100%; }

/* ============================================================
   COMPONENTS вҖ” Tags, WA, Peers, Contest, Speed, Streak, Quality
   ============================================================ */
.section-label { font-size: var(--fs-xs); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; border-bottom: 0.5px solid var(--border); padding-bottom: 2px; }
.badge { font-size: var(--fs-2xs); padding: 1px 4px; font-weight: 500; }
.badge-green { background: #040e06; color: var(--green); border: 0.5px solid #0a2a0a; }
.badge-amber { background: #0c0600; color: var(--amber); border: 0.5px solid #2a1400; }
.badge-cyan  { background: #03080c; color: var(--cyan); border: 0.5px solid #0a2030; }

.tag-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.tag-row.active { border-left: 2px solid var(--green); padding-left: 3px; background: #030a04; }
.tag-name { font-size: var(--fs-md); color: var(--dim); min-width: 52px; }
.tag-bar { flex: 1; height: 10px; background: var(--bar-bg); overflow: hidden; border-radius: 2px; }
.tag-bar-fill { height: 100%; }
.tag-pct { font-size: var(--fs-md); min-width: 30px; text-align: right; }

.wa-item { display: flex; gap: 4px; align-items: center; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.wa-item:last-child { border-bottom: none; }
.wa-indicator { width: 3px; flex-shrink: 0; align-self: stretch; }
.wa-badge { font-size: var(--fs-xs); padding: 1px 3px; background: #1a0808; color: #aa4444; border: 0.5px solid #3a1010; flex-shrink: 0; }
.wa-name { font-size: var(--fs-md); color: #6a6a6a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wa-tag { font-size: var(--fs-xs); color: var(--dim); margin-right: 2px; }
.wa-diff { font-size: var(--fs-sm); color: var(--muted); }

.peer-row { display: grid; grid-template-columns: 1fr 32px 32px; gap: 2px; align-items: center; padding: 3px 2px; border-bottom: 0.5px solid var(--border); font-size: var(--fs-md); }
.peer-row:last-child { border-bottom: none; }
.peer-self { background: #030a04; border-left: 2px solid #1a4a1a; padding-left: 4px; }
.peer-num { text-align: right; }

.contest-item { display: flex; align-items: center; gap: 4px; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.contest-item:last-child { border-bottom: none; }
.contest-badge { font-size: var(--fs-xs); padding: 1px 3px; border: 0.5px solid; min-width: 24px; text-align: center; flex-shrink: 0; }
.contest-badge-abc { background: #030c03; color: var(--green); border-color: #0a2a0a; }
.contest-badge-arc { background: #0c0800; color: var(--amber); border-color: #2a1800; }
.contest-badge-ahc { background: #03030c; color: var(--blue); border-color: #0a0a2a; }
.contest-name { font-size: var(--fs-md); color: #6a8a8a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contest-time { font-size: var(--fs-sm); color: var(--muted); }
.contest-rated { font-size: var(--fs-xs); color: var(--dim); text-align: right; flex-shrink: 0; }
.contest-rated.yes { color: var(--green) !important; }

.speed-row { display: flex; align-items: center; gap: 4px; padding: 2px; }
.speed-row.active { border-left: 2px solid var(--cyan); padding-left: 4px; background: #04080c; }
.speed-label { font-size: var(--fs-sm); color: var(--dim); min-width: 22px; }
.speed-bar { flex: 1; height: 12px; background: #0a1010; overflow: hidden; }
.speed-bar-fill { height: 100%; display: flex; align-items: center; padding-left: 3px; }
.speed-bar-text { font-size: var(--fs-xs); color: #060808; font-weight: 500; }
.speed-value { font-size: var(--fs-sm); min-width: 32px; text-align: right; }

.streak-grid { display: grid; grid-template-columns: repeat(28,1fr); gap: 2px; }
.streak-cell { height: 12px; border-radius: 1px; }
.streak-none { background: #0c1818; }
.streak-amber { background: var(--amber); opacity: .9; }
.streak-green { background: var(--green); opacity: .9; }
.streak-cyan { background: var(--cyan); opacity: .9; }
.streak-today { outline: 1px solid rgba(255,255,255,.45); outline-offset: 1px; }

.quality-bar { display: flex; height: 10px; gap: 1px; overflow: hidden; }
.quality-seg { height: 100%; }

.quest-card { background: var(--panel); border: 0.5px solid var(--border); padding: 4px 6px; display: flex; align-items: center; gap: 4px; overflow: hidden; }
.quest-card.review { border-color: #0a2a0a; background: #030a03; box-shadow: inset 2px 0 0 var(--green); }
.quest-card.boss { border-color: #2a1800; background: #060800; }
.quest-title { font-size: var(--fs-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-detail { font-size: var(--fs-2xs); color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-xp { font-size: var(--fs-sm); color: var(--green); font-weight: 500; white-space: nowrap; }

.insight-box { background: var(--panel); border: 0.5px solid #0a2a14; box-shadow: inset 2px 0 0 var(--green); padding: 4px 8px; display: flex; flex-direction: column; gap: 2px; }
.insight-text { font-size: var(--fs-xs); color: #3a8a5a; line-height: 1.3; }

.achievement-bar { background: var(--panel); border: 0.5px solid var(--border); padding: 3px 6px; display: flex; align-items: center; gap: 6px; }
.achievement-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 3px; flex: 1; }
.achievement-item { background: #040c0c; border: 0.5px solid var(--border); padding: 2px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.achievement-item.gold { background: #080600; border-color: #1a1000; }
.achievement-item.fresh { border-color: var(--green) !important; }
.achievement-item.locked { opacity: 0.2; }
.achievement-icon { font-size: var(--fs-md); line-height: 1; }
.achievement-label { font-size: var(--fs-2xs); text-align: center; color: var(--muted); line-height: 1.1; }
</style>
</head>
<body>
<!-- hydrate()гҒҢbody.innerHTMLгҒ«е…ЁгӮігғігғҶгғігғ„гӮ’з”ҹжҲҗ -->
<script>
function renderHUD(d) {
	const h = d.hud || {}, ps = d.player_status || {}, sp = d.speed || [];
	const last = sp.length ? sp[sp.length-1] : null;
	const spd = last ? Math.floor(last.avg_a_seconds/60)+':'+String(last.avg_a_seconds%60).padStart(2,'0') : '--';
	const remain = (ps.rating_max||0) - (ps.rating||0);
	const cn = Math.ceil(remain/30)||0;
	const fc = (d.contests||[])[0];
	function s(l,v,sub,c) {
		return '<div class="hud-section"><div class="hud-label">'+l+'</div><div class="hud-value" style="color:'+c+'">'+v+'</div>'+(sub?'<div class="hud-sub">'+sub+'</div>':'')+'</div>';
	}
	return '<div class="hud">'
		+s('system','[ CP // ONLINE ]','','#1a5a2a')
		+s('rating',h.rating+' <span style="color:var(--dim)">'+(h.rank_label||'')+'</span>','','var(--amber)')
		+s('streak','рҹ”Ҙ '+(h.streak_days||0)+'ж—Ҙ','','#ff8030')
		+s('today xp',(ps.today_xp||0).toLocaleString()+' XP','Lv'+(ps.level||0),'var(--green)')
		+s('combo','Г—'+(d.combo||0),'','var(--blue)')
		+s('еҲқиҰӢAC',Math.round((d.first_ac_rate||0)*100)+'%','','var(--green)')
		+s('Aе•ҸйЎҢйҖҹеәҰ',spd,'','var(--cyan)')
		+s('ж—©жңқAC',h.first_ac_today||'--:--','avg '+(h.avg_first_ac||'--:--'),'#ffcc00')
		+s('з·‘гҒҫгҒ§',cn*7+'ж—Ҙ / '+cn+'жҲҰ','','#4a6a4a')
		+'<div class="hud-spacer"></div>'
		+(fc?'<div class="hud-boss"><div><div style="font-size:var(--fs-2xs);color:#3a2a00;letter-spacing:.12em;text-transform:uppercase">BOSS FIGHT</div><div style="font-size:var(--fs-md);color:var(--amber);font-weight:500" id="boss-name">'+fc.type+' '+fc.id.replace(/[a-z]+/,'')+'</div></div><div class="hud-boss-timer" id="boss-timer">--:--:--</div></div>':'')
		+'</div>';
}
function renderPlayerStatus(d) {
	const ps = d.player_status||{}, pct=((ps.rating_progress||0)*100).toFixed(1);
	const acs = (ps.today_acs||[]).map(a=>'<span class="badge badge-green">'+a.problem_id+' +'+a.xp+'</span>').join(' ');
	return '<div class="panel accent-amber" data-label="PLAYER STATUS"><div class="panel-inner">'
		+'<div style="display:flex;justify-content:space-between;align-items:flex-end"><div><div style="font-size:var(--fs-2xs);color:var(--muted)">RATING</div><div class="ps-rating">'+(ps.rating||0)+'</div></div><div style="text-align:right"><div style="font-size:var(--fs-2xs);color:var(--muted)">LEVEL</div><div class="ps-level">'+(ps.level||0)+'</div></div></div>'
		+'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:var(--amber)"></div></div>'
		+'<div style="display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--muted)"><span>'+(ps.rating_min||0)+'</span><span style="color:var(--amber)">'+(ps.rating||0)+'</span><span style="color:var(--green)">'+(ps.rating_max||0)+'</span></div>'
		+'<div class="ps-box-green"><div style="font-size:var(--fs-2xs);color:#1a4a1a">TODAY XP</div><div><span class="ps-xp">'+(ps.today_xp||0).toLocaleString()+'</span> <span style="font-size:var(--fs-sm);color:#1a5a1a">XP</span></div>'+(acs?'<div style="display:flex;gap:3px;margin-top:2px;flex-wrap:wrap">'+acs+'</div>':'')+'</div>'
		+'<div class="ps-box-amber"><span style="font-size:var(--fs-lg)">рҹ”Ҙ</span><div><span class="ps-streak">'+(ps.streak_days||0)+'</span> <span style="font-size:var(--fs-sm);color:#6a3a00">ж—ҘйҖЈз¶ҡ</span><div style="font-size:var(--fs-2xs);color:#3a1800">жңҖй•·: '+(ps.max_streak||0)+'ж—Ҙ</div></div></div>'
		+'</div></div>';
}
function renderWAQueue(d) {
	const wq = d.wa_queue||[];
	let items = '';
	wq.forEach(w => {
		const c = w.wa_count>=3?'#cc4444':w.wa_count>=2?'var(--amber)':'#333';
		items += '<div class="wa-item"><div class="wa-indicator" style="background:'+c+'"></div><span class="wa-badge">Г—'+w.wa_count+'</span><span class="wa-name">'+w.problem_id+'</span><span class="wa-tag">'+w.tag+'</span><span class="wa-diff">'+w.difficulty+'</span></div>';
	});
	return '<div class="panel" data-label="WA QUEUE" style="flex:1"><div class="panel-inner"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:var(--fs-xs);color:var(--dim)">еҫ©зҝ’еҫ…гҒЎ '+wq.length+'е•Ҹ</span><span class="badge badge-amber">е„Әе…Ҳй Ҷ</span></div>'+items+'</div></div>';
}
function renderDifficultyLog(d) {
	const dl=d.difficulty_log||{}, pts=dl.points||[], avg=dl.seven_day_avg||[], cr=dl.current_rating||0;
	if(!pts.length) return '<div class="panel" data-label="DIFFICULTY LOG" style="grid-column:2;grid-row:1"><div class="panel-inner"></div></div>';
	const M=1200,xL=44,xR=550,yT=12,yB=130,mE=pts[0].epoch,xE=pts[pts.length-1].epoch,R=xE-mE||1;
	const X=e=>xL+(e-mE)/R*(xR-xL), Y=v=>yB-(v/M)*(yB-yT);
	let s='<svg width="100%" height="100%" viewBox="0 0 560 140" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
	[1200,900,600,300].forEach(v=>{const y=Y(v);s+='<line x1="'+xL+'" y1="'+y+'" x2="'+xR+'" y2="'+y+'" stroke="#0c1c1c" stroke-width="0.5"/><text x="38" y="'+(y+2)+'" fill="#0c1e1e" font-size="7" text-anchor="end" font-family="monospace">'+v+'</text>';});
	if(cr>0){const y=Y(cr);s+='<line x1="'+xL+'" y1="'+y+'" x2="'+xR+'" y2="'+y+'" stroke="#4a2a00" stroke-width="0.5" stroke-dasharray="3,3"/><text x="552" y="'+(y+3)+'" fill="#4a2a00" font-size="7" font-family="monospace">'+cr+'</text>';}
	const h=Math.floor(pts.length/2);s+='<g opacity="0.35">';pts.forEach((p,i)=>{s+='<circle cx="'+X(p.epoch).toFixed(1)+'" cy="'+Y(p.difficulty).toFixed(1)+'" r="2.2" fill="'+(i<h?'#335577':'#3a7a5a')+'"/>';});s+='</g>';
	if(avg.length>1)s+='<polyline points="'+avg.map(a=>X(a.epoch).toFixed(1)+','+Y(a.avg).toFixed(1)).join(' ')+'" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linejoin="round"/>';
	s+='<text x="'+xL+'" y="136" fill="#0c1e1e" font-size="7" text-anchor="start" font-family="monospace">'+(new Date(pts[0].epoch*1000).getMonth()+1)+'жңҲ</text>';
	s+='<text x="'+xR+'" y="136" fill="var(--cyan)" font-size="7" text-anchor="end" font-family="monospace">д»Ҡ</text></svg>';
	return '<div class="panel" data-label="DIFFICULTY LOG" style="grid-column:2;grid-row:1"><div class="panel-inner">'
		+'<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:3px"><span style="font-size:var(--fs-2xs);color:#335577">в—Ҹ AC</span><span style="font-size:var(--fs-2xs);color:var(--cyan)">вҖ” 7ж—Ҙavg</span><span style="font-size:var(--fs-2xs);color:var(--amber)">-- rate</span></div>'
		+'<div style="flex:1;min-height:0">'+s+'</div></div></div>';
}
function renderTagACRate(d) {
	let h='<div class="section-label">гӮҝгӮ°еҲҘACзҺҮ</div>';
	(d.tag_ac_rate||[]).forEach((t,i)=>{const p=Math.round(t.ac_rate*100),c=p>=70?'var(--green)':p>=50?'var(--amber)':'#885522';h+='<div class="tag-row'+(i===0?' active':'')+'"><span class="tag-name">'+t.tag+'</span><div class="tag-bar"><div class="tag-bar-fill" style="width:'+p+'%;background:'+c+'"></div></div><span class="tag-pct" style="color:'+c+'">'+p+'%</span></div>';});
	return h;
}
function renderPeerTable(d) {
	let h='<div class="section-label">еҗҢгғ¬гғјгғҲеёҜ Вұ50</div><div class="peer-row" style="font-size:var(--fs-2xs);color:var(--muted)"><span>user</span><span class="peer-num">rate</span><span class="peer-num">жңҲAC</span></div>';
	(d.peers||[]).forEach(p=>{const s=p.is_self,n=s?'вҶҗ '+p.user:p.user;h+='<div class="peer-row'+(s?' peer-self':'')+'"><span style="color:'+(s?'var(--green)':'#5a7a7a')+'">'+n+'</span><span class="peer-num" style="color:'+(s?'var(--amber)':'#4a4a4a')+'">'+p.rating+'</span><span class="peer-num">'+p.monthly_ac+'</span></div>';});
	return h;
}
function renderStreakCalendar(d) {
	const cal=d.streak_calendar||[], h=d.hud||{};
	const now=new Date(),ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
	let g='';cal.forEach(c=>{let cls='streak-cell ';if(c.ac_count===0)cls+='streak-none';else if(c.max_difficulty>=1200)cls+='streak-cyan';else if(c.max_difficulty>=800)cls+='streak-green';else cls+='streak-amber';if(c.date===ts)cls+=' streak-today';g+='<div class="'+cls+'"></div>';});
	for(let i=cal.length;i<28;i++)g+='<div class="streak-cell streak-none" style="opacity:.15"></div>';
	return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:var(--fs-sm);color:var(--dim)">жңҖй•· '+(h.max_streak||0)+'ж—Ҙ</span><span class="badge badge-amber">рҹ”Ҙ '+(h.streak_days||0)+'ж—Ҙ</span></div>'
		+'<div style="font-size:var(--fs-2xs);color:var(--muted);display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:2px"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>'
		+'<div class="streak-grid">'+g+'</div>'
		+'<div style="display:flex;gap:4px;margin:3px 0;font-size:var(--fs-2xs);color:var(--muted)"><span>в—Ҹ гҒӘгҒ—</span><span style="color:var(--amber)">в—Ҹ 400гҖң</span><span style="color:var(--green)">в—Ҹ 800гҖң</span><span style="color:var(--cyan)">в—Ҹ 1200гҖң</span></div>'
		+'<div style="background:#060800;border:0.5px solid #5a4000;padding:4px 6px;box-shadow:inset 2px 0 0 var(--amber)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:var(--fs-2xs);color:#5a4000">рҹҢ… д»Ҡж—ҘгҒ®еҲқеӣһжҸҗеҮә</div><div style="font-size:var(--fs-lg);font-weight:500;color:#ffcc00;line-height:1.1">'+(h.first_ac_today||'--:--')+'</div></div><div style="text-align:right"><div style="font-size:var(--fs-2xs);color:#3a2a00">avg '+(h.avg_first_ac||'--:--')+'</div></div></div></div>';
}
function renderQualityBar(d) {
	const q=d.quality||{};
	return '<div style="font-size:var(--fs-2xs);color:var(--muted);margin-bottom:2px">и§Јзӯ”гҒ®иіӘ</div>'
		+'<div class="quality-bar"><div class="quality-seg" style="width:'+(q.first_sight||0)+'%;background:var(--green)"></div><div class="quality-seg" style="width:'+(q.self_solve||0)+'%;background:#2a6a4a"></div><div class="quality-seg" style="width:'+(q.impl_fail||0)+'%;background:var(--amber)"></div><div class="quality-seg" style="width:'+(q.editorial||0)+'%;background:#4a2a1a"></div></div>'
		+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2px;font-size:var(--fs-2xs);color:var(--dim)"><span>в—Ҹ еҲқиҰӢ '+(q.first_sight||0)+'%</span><span>в—Ҹ иҮӘеҠӣ '+(q.self_solve||0)+'%</span><span>в—Ҹ е®ҹиЈ…Г— '+(q.impl_fail||0)+'%</span><span>в—Ҹ и§ЈиӘ¬ '+(q.editorial||0)+'%</span></div>';
}
function renderSpeedBars(d) {
	const sp=d.speed||[];if(!sp.length)return '';
	const mx=Math.max(...sp.map(s=>s.avg_a_seconds));
	let h='<div class="section-label">Aе•ҸйЎҢйҖҹеәҰ <span class="badge badge-cyan">вҶ“жңҖйҖҹ</span></div>';
	sp.forEach((s,i)=>{const last=i===sp.length-1,m=Math.floor(s.avg_a_seconds/60),sec=String(s.avg_a_seconds%60).padStart(2,'0'),t=m+':'+sec,p=Math.round(s.avg_a_seconds/mx*100),c=last?'var(--cyan)':(i<sp.length/2?'#335577':'#3a7a9a'),lb=s.month.replace(/^\d{4}-0?/,'')+'жңҲ';
	h+='<div class="speed-row'+(last?' active':'')+'"><span class="speed-label"'+(last?' style="color:var(--cyan)"':'')+'>'+lb+'</span><div class="speed-bar"><div class="speed-bar-fill" style="width:'+p+'%;background:'+c+'"><span class="speed-bar-text">'+t+'</span></div></div><span class="speed-value"'+(last?' style="color:var(--cyan)"':'')+'>'+(last?'вҶ“':'')+t+'</span></div>';});
	return h;
}
function renderContestList(d) {
	const days=['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
	let h='<div class="section-label">гӮігғігғҶгӮ№гғҲ</div>';
	(d.contests||[]).slice(0,5).forEach((c,i)=>{const dt=new Date(c.start_epoch*1000),ds=(dt.getMonth()+1)+'/'+dt.getDate()+' ('+days[dt.getDay()]+') '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'),b=c.type==='ABC'?'contest-badge-abc':c.type==='ARC'?'contest-badge-arc':'contest-badge-ahc',r=c.is_rated_for_user?'<div class="contest-rated yes">'+c.rated_range+' в—Ҹ</div>':'<div class="contest-rated">еҜҫиұЎеӨ–</div>',t=c.title.replace(/.*\(/,'').replace(/\)$/,'').replace('AtCoder ','');
	h+='<div class="contest-item"><span class="contest-badge '+b+'">'+c.type+'</span><div style="flex:1;min-width:0"><div class="contest-name">'+t+'</div><div class="contest-time"'+(i===0?' style="color:var(--amber)"':'')+'>'+ds+(i===0?' BOSS':'')+'</div></div>'+r+'</div>';});
	return h;
}
function renderBottomBar(d) {
	let h='';
	(d.quests||[]).forEach(q=>{const c=q.type==='review'?' review':q.type==='boss'?' boss':'',tc=q.type==='review'?'color:var(--green)':q.type==='boss'?'color:var(--amber)':'',xp=q.xp>0?'<span class="quest-xp">+'+q.xp+' XP</span>':'<span style="font-size:var(--fs-sm);color:var(--amber);font-weight:500">+гғ¬гғјгғҲ</span>';
	h+='<div class="quest-card'+c+'"><div style="flex:1;min-width:0"><div class="quest-title" style="'+tc+'">'+q.title+'</div><div class="quest-detail">'+q.detail+'</div></div>'+xp+'</div>';});
	h+='<div style="display:grid;grid-template-rows:1fr 1fr;gap:3px">';
	if(d.insight)h+='<div class="insight-box"><div style="display:flex;justify-content:space-between;font-size:var(--fs-2xs);color:#1a5a2a"><span>д»Ҡж—ҘгҒ®жҙһеҜҹ</span><span style="color:#1a3a2a">'+d.insight.tag+' В· diff'+d.insight.difficulty+'</span></div><div class="insight-text">'+d.insight.text+'</div></div>';
	if(d.achievements){const a=d.achievements;h+='<div class="achievement-bar"><span style="font-size:var(--fs-2xs);color:var(--muted);white-space:nowrap">е®ҹзёҫ '+a.unlocked+'/'+a.total+'</span><div class="achievement-grid">';(a.list||[]).forEach(m=>{const c=m.status==='gold'?' gold':m.status==='new'?' fresh':m.status==='lock'?' locked':'';h+='<div class="achievement-item'+c+'"><div class="achievement-icon">'+m.icon+'</div><div class="achievement-label">'+m.label+'</div></div>';});h+='</div></div>';}
	h+='</div>';return h;
}

function hydrate() {
	const d = window.__CP_DATA;
	if (!d) return;
	const vp = window.__VP || {w:1080, h:675};
	// bodyгӮ’зӣҙжҺҘgridгӮігғігғҶгғҠгҒЁгҒ—гҒҰдҪҝз”ЁпјҲmainгғ–гғ©гғігғҒгҒЁеҗҢгҒҳж§ӢйҖ пјү
	document.body.innerHTML = renderHUD(d)
		+'<div class="main"><div class="col-left">'+renderPlayerStatus(d)+renderWAQueue(d)+'</div>'
		+renderDifficultyLog(d)
		+'<div class="panel accent-green" data-label="TAG AC RATE / PEER" style="grid-column:2;grid-row:2"><div class="panel-inner" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div>'+renderTagACRate(d)+'</div><div>'+renderPeerTable(d)+'</div></div></div>'
		+'<div class="col-right"><div class="panel" data-label="SKILL GRAPH" style="flex:1.7;overflow:hidden"><div class="panel-inner"><div style="text-align:center;color:var(--dim);padding-top:20px">Skill Graph</div></div></div>'
		+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;flex:1">'
		+'<div class="panel accent-amber" data-label="STREAK / DIFF COLOR"><div class="panel-inner">'+renderStreakCalendar(d)+renderQualityBar(d)+'</div></div>'
		+'<div class="panel accent-cyan" data-label="SPEED / CONTEST"><div class="panel-inner" style="gap:3px">'+renderSpeedBars(d)+'<div style="border-top:0.5px solid var(--border);padding-top:3px">'+renderContestList(d)+'</div></div></div>'
		+'</div></div></div>'
		+'<div class="bottom">'+renderBottomBar(d)+'</div>';

	const fc=(d.contests||[])[0];
	if(fc){const bt=document.getElementById('boss-timer');if(bt)setInterval(()=>{const diff=fc.start_epoch-Date.now()/1000;if(diff<=0){bt.textContent='LIVE';return;}bt.textContent=Math.floor(diff/3600)+':'+String(Math.floor((diff%3600)/60)).padStart(2,'0')+':'+String(Math.floor(diff%60)).padStart(2,'0');},1000);}
}
</script>
</body>
