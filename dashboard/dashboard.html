<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
/* ============================================================
   THEME — colors and scale
   ============================================================ */
:root {
	--fs-2xs: 10px;  /* 補助の中でも最小 */
	--fs-xs:  11px;  /* 補助ラベル */
	--fs-sm:  12px;  /* ラベル・サブテキスト */
	--fs-md:  14px;  /* 通常テキスト */
	--fs-lg:  20px;  /* HUD値・重要数字 */
	--fs-xl:  32px;  /* Streak数字 */
	--fs-2xl: 42px;  /* Today AC */
	--fs-3xl: 60px;  /* Rating（主役） */

	--bg:      #020404;
	--panel:   #061010;
	--border:  #1a3a3a;
	--border2: #2a5a5a;
	--text:    #8ababa;
	--dim:     #2a5a5a;
	--muted:   #1a3a3a;
	--green:   #4abe7a;
	--amber:   #d8a64e;
	--cyan:    #4abacc;
	--red:     #dd5555;
	--blue:    #5a8add;
	--bar-bg:  #0e2020;

	/* DEBUG: grid背景色 (本番時は全てvar(--bg)に戻す) */
	--dbg-body:       var(--bg);
	--dbg-hud:        var(--panel);
	--dbg-player:     var(--panel);
	--dbg-waqueue:    var(--panel);
	--dbg-recommend:  var(--panel);
	--dbg-difflog:    var(--panel);
	--dbg-tagrate:    var(--panel);
	--dbg-compare:    var(--panel);
	--dbg-skillgraph: var(--panel);
	--dbg-streak:     var(--panel);
	--dbg-speed:      var(--panel);
	--dbg-bottom:     var(--bg);
	--dbg-insight:    var(--panel);
	--dbg-achieve:    var(--panel);
	--dbg-main:       var(--bg);
	--dbg-colright2:  var(--bg);
}

/* デバッグモード: コメントを外すと各グリッドが色分けされる
:root {
	--dbg-body:       #1a0000;
	--dbg-hud:        #2a1010;
	--dbg-player:     #102a10;
	--dbg-waqueue:    #10102a;
	--dbg-recommend:  #1a201a;
	--dbg-difflog:    #2a2a10;
	--dbg-tagrate:    #2a102a;
	--dbg-compare:    #102a2a;
	--dbg-skillgraph: #10202a;
	--dbg-streak:     #201a10;
	--dbg-speed:      #101a20;
	--dbg-bottom:     #1a1a00;
	--dbg-insight:    #0a2a1a;
	--dbg-achieve:    #2a0a1a;
	--dbg-main:       #001a00;
	--dbg-colright2:  #00001a;
}
*/

*/

/* ============================================================
   LAYOUT
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); width: 100%; height: 100%; overflow: hidden; }
body {
	background: var(--bg);
	width: 100%;
	height: 100%;
	overflow: hidden;
	font-family: monospace;
	color: var(--text);
	-webkit-font-smoothing: antialiased;
	display: grid;
	grid-template-rows: 4% 96%;
	gap: 6px;
	padding: 3px;
	min-width: 0;
	min-height: 0;
	background: var(--dbg-body);
}

.main {
	display: grid;
	grid-template-columns: 15% 1fr;
	grid-template-rows: 1fr;
	background: var(--dbg-main);
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}

.col-left { display: flex; flex-direction: column; gap: 6px; min-height: 0; overflow: hidden; }
.col-right {
	display: grid;
	grid-template-rows: 3fr 2fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.col-right-top {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.col-right-bottom {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
	gap: 6px;
	min-height: 0;
	overflow: hidden;
}
.bottom    { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--dbg-bottom); }

/* ============================================================
   COMPONENTS — panel
   ============================================================ */
.panel { background: var(--panel); border: 0.5px solid var(--border); position: relative; overflow: hidden; }
.panel[data-label]::before { content: attr(data-label); position: absolute; top: 0; left: 0; font-size: var(--fs-xs); color: var(--muted); letter-spacing: .12em; padding: 2px 6px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); background: var(--bg); z-index: 1; white-space: nowrap; }
.panel-inner { padding: 48px 24px 12px; height: 100%; display: flex; flex-direction: column; gap: 8px; }
.panel.accent-green { border-color: #2a6a3a !important; box-shadow: inset 3px 0 0 var(--green); }
.panel.accent-amber { border-color: #6a3a00 !important; box-shadow: inset 3px 0 0 var(--amber); }
.panel.accent-cyan  { border-color: #2a4a6a !important; box-shadow: inset 3px 0 0 var(--cyan); }

/* ============================================================
   COMPONENTS — HUD
   ============================================================ */
.hud { background: var(--panel); border: 0.5px solid var(--border); display: flex; align-items: stretch; overflow: hidden; justify-content: space-between; }
.hud-section { display: flex; flex-direction: column; justify-content: flex-start; padding: 1px 6px; border-right: 0.5px solid var(--border); min-width: 0; flex: 1; }
.hud-label { font-size: var(--fs-sm); color: #8aaa9a; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 1px; text-align: left; }
.hud-value { font-size: var(--fs-lg); font-weight: 500; line-height: 1.1; white-space: nowrap; text-align: center; }
.hud-sub { font-size: var(--fs-xs); color: var(--dim); }
.hud-spacer { flex: 1; }
.hud-boss { display: flex; align-items: center; gap: 8px; padding: 0 12px; background: #060800; border-left: 0.5px solid #2a1800; flex-shrink: 0; }
.hud-boss-timer { font-size: var(--fs-xl); font-weight: 500; color: #ffb030; }

/* ============================================================
   COMPONENTS — Player Status
   ============================================================ */
.ps-rating  { font-size: var(--fs-3xl); font-weight: 500; color: var(--amber); line-height: 1; }
.ps-level   { font-size: var(--fs-xl); font-weight: 500; color: var(--cyan); line-height: 1; }
.ps-xp      { font-size: var(--fs-2xl); font-weight: 500; color: var(--green); line-height: 1; }
.ps-streak  { font-size: var(--fs-xl); font-weight: 500; color: #ff8030; line-height: 1; }
.ps-box-green { background: #040c04; border: 0.5px solid #0a2a0a; padding: 4px 6px; }
.ps-box-amber { display: flex; align-items: center; gap: 4px; background: #060800; border: 0.5px solid #2a1800; padding: 4px 6px; }
.progress-bar { background: var(--bar-bg); height: 20px; width: 100%; overflow: hidden; border: 2px solid var(--border); }
.progress-fill { height: 100%; }

/* ============================================================
   COMPONENTS — Tags, WA, Peers, Contest, Speed, Streak, Quality
   ============================================================ */
.section-label { font-size: var(--fs-xs); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; border-bottom: 0.5px solid var(--border); padding-bottom: 2px; }
.badge { font-size: var(--fs-2xs); padding: 1px 4px; font-weight: 500; }
.badge-green { background: #040e06; color: var(--green); border: 0.5px solid #0a2a0a; }
.badge-amber { background: #0c0600; color: var(--amber); border: 0.5px solid #2a1400; }
.badge-cyan  { background: #03080c; color: var(--cyan); border: 0.5px solid #0a2030; }

.tag-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.tag-row.active { border-left: 2px solid var(--green); padding-left: 3px; background: #030a04; }
.tag-name { font-size: var(--fs-md); color: var(--dim); min-width: 52px; }
.tag-bar { flex: 1; height: 40px; background: var(--bar-bg); overflow: hidden; border-radius: 8px; }
.tag-bar-fill { height: 100%; }
.tag-pct { font-size: var(--fs-md); min-width: 30px; text-align: right; }

.wa-item { display: flex; gap: 4px; align-items: center; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.wa-item:last-child { border-bottom: none; }
.wa-indicator { width: 3px; flex-shrink: 0; align-self: stretch; }
.wa-badge { font-size: var(--fs-xs); padding: 1px 3px; background: #1a0808; color: #aa4444; border: 0.5px solid #3a1010; flex-shrink: 0; }
.wa-name { font-size: var(--fs-md); color: #6a6a6a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wa-tag { font-size: var(--fs-xs); color: var(--dim); margin-right: 2px; }
.wa-diff { font-size: var(--fs-sm); color: var(--muted); }

.peer-row { display: grid; grid-template-columns: 1fr 32px 32px; gap: 2px; align-items: center; padding: 3px 2px; border-bottom: 0.5px solid var(--border); font-size: var(--fs-md); }
.peer-row:last-child { border-bottom: none; }
.peer-self { background: #030a04; border-left: 2px solid #1a4a1a; padding-left: 4px; }
.peer-num { text-align: right; }

.contest-item { display: flex; align-items: center; gap: 4px; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
.contest-item:last-child { border-bottom: none; }
.contest-badge { font-size: var(--fs-xs); padding: 1px 3px; border: 0.5px solid; min-width: 24px; text-align: center; flex-shrink: 0; }
.contest-badge-abc { background: #030c03; color: var(--green); border-color: #0a2a0a; }
.contest-badge-arc { background: #0c0800; color: var(--amber); border-color: #2a1800; }
.contest-badge-ahc { background: #03030c; color: var(--blue); border-color: #0a0a2a; }
.contest-name { font-size: var(--fs-md); color: #6a8a8a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contest-time { font-size: var(--fs-sm); color: var(--muted); }
.contest-rated { font-size: var(--fs-xs); color: var(--dim); text-align: right; flex-shrink: 0; }
.contest-rated.yes { color: var(--green) !important; }

.speed-row { display: flex; align-items: center; gap: 4px; padding: 2px; }
.speed-row.active { border-left: 2px solid var(--cyan); padding-left: 4px; background: #04080c; }
.speed-label { font-size: var(--fs-sm); color: var(--dim); min-width: 22px; }
.speed-bar { flex: 1; height: 48px; background: #0a1010; overflow: hidden; }
.speed-bar-fill { height: 100%; display: flex; align-items: center; padding-left: 3px; }
.speed-bar-text { font-size: var(--fs-xs); color: #060808; font-weight: 500; }
.speed-value { font-size: var(--fs-sm); min-width: 32px; text-align: right; }

.streak-grid { display: grid; grid-template-columns: repeat(28,1fr); gap: 2px; }
.streak-cell { height: 48px; border-radius: 4px; }
.streak-none { background: #0c1818; }
.streak-amber { background: var(--amber); opacity: .9; }
.streak-green { background: var(--green); opacity: .9; }
.streak-cyan { background: var(--cyan); opacity: .9; }
.streak-today { outline: 1px solid rgba(255,255,255,.45); outline-offset: 1px; }

.quality-bar { display: flex; height: 40px; gap: 4px; overflow: hidden; }
.quality-seg { height: 100%; }

.quest-card { background: var(--panel); border: 0.5px solid var(--border); padding: 4px 6px; display: flex; align-items: center; gap: 4px; overflow: hidden; }
.quest-card.review { border-color: #0a2a0a; background: #030a03; box-shadow: inset 2px 0 0 var(--green); }
.quest-card.boss { border-color: #2a1800; background: #060800; }
.quest-title { font-size: var(--fs-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-detail { font-size: var(--fs-2xs); color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quest-xp { font-size: var(--fs-sm); color: var(--green); font-weight: 500; white-space: nowrap; }

.insight-box { background: var(--panel); border: 0.5px solid #0a2a14; box-shadow: inset 2px 0 0 var(--green); padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 60px; }
.insight-text { font-size: var(--fs-md); color: #3a8a5a; line-height: 1.3; }

.achievement-bar { background: var(--panel); border: 0.5px solid var(--border); padding: 3px 6px; display: flex; align-items: center; gap: 6px; }
.achievement-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 6px; flex: 1; }
.achievement-item { background: #040c0c; border: 0.5px solid var(--border); padding: 2px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.achievement-item.gold { background: #080600; border-color: #1a1000; }
.achievement-item.fresh { border-color: var(--green) !important; }
.achievement-item.locked { opacity: 0.2; }
.achievement-icon { font-size: var(--fs-md); line-height: 1; }
.achievement-label { font-size: var(--fs-2xs); text-align: center; color: var(--muted); line-height: 1.1; }
</style>
</head>
<body>
<!-- hydrate()がbody.innerHTMLに全コンテンツを生成 -->
<script>
function renderHUD(d) {
	const h = d.hud || {}, ps = d.player_status || {}, sp = d.speed || [];
	const last = sp.length ? sp[sp.length-1] : null;
	const spd = last ? Math.floor(last.avg_a_seconds/60)+':'+String(last.avg_a_seconds%60).padStart(2,'0') : '--';
	const remain = (ps.rating_max||0) - (ps.rating||0);
	const cn = Math.ceil(remain/30)||0;
	const fc = (d.contests||[])[0];
	function s(l,v,sub,c) {
		return '<div class="hud-section"><div class="hud-label">'+l+'</div><div class="hud-value" style="color:'+c+'">'+v+'</div>'+(sub?'<div class="hud-sub">'+sub+'</div>':'')+'</div>';
	}
	const todayAc = (ps.today_acs||[]).length;
	const totalAc = h.ac_count || 0;
	const cmp = d.compare || {};
	const monthAc = cmp.this_month_ac || 0;

	return '<div class="hud" style="background:var(--dbg-hud)">'
		+s('system','[ CP // ONLINE ]','','#1a5a2a')
		+s('rating',h.rating+' <span style="color:var(--dim)">'+(h.rank_label||'')+'</span>','','var(--amber)')
		+s('streak','🔥 '+(h.streak_days||0)+'日','','#ff8030')
		+s('today ac',todayAc+'問','total '+(totalAc),'var(--green)')
		+s('月AC',monthAc+'問','','var(--blue)')
		+s('合計AC',totalAc+'問','','var(--cyan)')
		+s('A問題速度',spd,'','var(--cyan)')
		+s('早朝AC',h.first_ac_today||'--:--','avg '+(h.avg_first_ac||'--:--'),'#ffcc00')
		+s('緑まで',cn*7+'日 / '+cn+'戦','','#4a6a4a')
		+''
		+(fc?'<div class="hud-boss"><div><div style="font-size:var(--fs-2xs);color:#3a2a00;letter-spacing:.12em;text-transform:uppercase">BOSS FIGHT</div><div style="font-size:var(--fs-md);color:var(--amber);font-weight:500" id="boss-name">'+fc.type+' '+fc.id.replace(/[a-z]+/,'')+'</div></div><div class="hud-boss-timer" id="boss-timer">--:--:--</div></div>':'')
		+'</div>';
}
function renderPlayerStatus(d) {
	const ps = d.player_status||{}, h = d.hud||{};
	const pct = ((ps.rating_progress||0)*100).toFixed(1);
	const todayAc = (ps.today_acs||[]).length;
	const totalAc = h.ac_count || 0;
	return '<div class="panel accent-amber" data-label="PLAYER STATUS" style="background:var(--dbg-player)"><div class="panel-inner">'
		+'<div style="display:flex;justify-content:space-between;align-items:flex-end"><div><div style="font-size:var(--fs-sm);color:#8aaa9a">RATING</div><div class="ps-rating">'+(ps.rating||0)+'</div></div><div style="text-align:right"><div style="font-size:var(--fs-sm);color:#8aaa9a">AC</div><div class="ps-level">'+totalAc+'</div></div></div>'
		+'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:var(--amber)"></div></div>'
		+'<div style="display:flex;justify-content:space-between;font-size:var(--fs-sm);color:var(--muted)"><span>'+(ps.rating_min||0)+'</span><span style="color:var(--amber)">'+(ps.rating||0)+'</span><span style="color:var(--green)">'+(ps.rating_max||0)+'</span></div>'
		+'<div class="ps-box-green"><div style="font-size:var(--fs-sm);color:#3a8a5a">TODAY AC</div><div><span class="ps-xp">'+todayAc+'</span> <span style="font-size:var(--fs-sm);color:#1a5a1a">問</span></div></div>'
		+'<div class="ps-box-amber"><span style="font-size:var(--fs-lg)">🔥</span><div><span class="ps-streak">'+(ps.streak_days||0)+'</span> <span style="font-size:var(--fs-sm);color:#6a3a00">日連続</span><div style="font-size:var(--fs-sm);color:#5a3a00">最長: '+(ps.max_streak||0)+'日</div></div></div>'
		+'</div></div>';
}
function renderWAQueue(d) {
	const wq = d.wa_queue||[];
	let items = '';
	wq.forEach(w => {
		const c = w.wa_count>=3?'#cc4444':w.wa_count>=2?'var(--amber)':'#333';
		items += '<div class="wa-item"><div class="wa-indicator" style="background:'+c+'"></div><span class="wa-badge">×'+w.wa_count+'</span><span class="wa-name">'+w.problem_id+'</span><span class="wa-tag">'+w.tag+'</span><span class="wa-diff">'+w.difficulty+'</span></div>';
	});
	return '<div class="panel" data-label="WA QUEUE" style="flex:1;background:var(--dbg-waqueue)"><div class="panel-inner"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:var(--fs-xs);color:var(--dim)">復習待ち '+wq.length+'問</span><span class="badge badge-amber">優先順</span></div>'+items+'</div></div>';
}
function ratingColor(r){if(r>=2800)return'#ff0000';if(r>=2400)return'#ff8000';if(r>=2000)return'#c0c000';if(r>=1600)return'#0000ff';if(r>=1200)return'#00c0c0';if(r>=800)return'#008000';if(r>=400)return'#804000';return'#808080';}
function renderDifficultyLog(d) {
	const dl=d.difficulty_log||{}, rh=d.rating_history||[], pts=dl.points||[];
	const proj=dl.projections||[], cr=dl.current_rating||0;
	if(!rh.length&&!pts.length) return '<div class="panel" data-label="DIFFICULTY LOG" style="background:var(--dbg-difflog)"><div class="panel-inner"></div></div>';

	const WEEK=7*86400;
	// Time window: difficulty data ± margin, not full rating_history
	const dataStart=pts.length?pts[0].epoch:(rh.length?rh[0].epoch:0);
	const frh=rh.filter(r=>r.epoch>=dataStart-30*86400);

	// All epochs for X range
	const allEpochs=[];
	frh.forEach(r=>allEpochs.push(r.epoch));
	pts.forEach(p=>allEpochs.push(p.epoch));
	proj.forEach(pr=>pr.points.forEach(p=>allEpochs.push(p.epoch)));
	if(!allEpochs.length) return '<div class="panel" data-label="DIFFICULTY LOG" style="background:var(--dbg-difflog)"><div class="panel-inner"></div></div>';
	const mE=Math.min(...allEpochs),xE=Math.max(...allEpochs);
	const totalWeeks=Math.ceil((xE-mE)/WEEK)+1;

	// Weekly difficulty sums (keyed by week index)
	const weekDiff={};
	pts.forEach(p=>{const wk=Math.floor((p.epoch-mE)/WEEK);weekDiff[wk]=(weekDiff[wk]||0)+p.difficulty;});

	// Rating by week
	const weekRate={};
	frh.forEach(r=>{const wk=Math.floor((r.epoch-mE)/WEEK);weekRate[wk]=r;});

	const W=560,H=510,xL=44,xR=550,yT=30,yB=435;
	const colW=(xR-xL)/totalWeeks;
	const Xw=wk=>xL+(wk+0.5)*colW;

	// Rating Y (left axis): 0 to current band + 2 bands above
	const bandThresholds=[0,400,800,1200,1600,2000,2400,2800,3200];
	let curBandIdx=0;for(let i=bandThresholds.length-1;i>=0;i--){if(cr>=bandThresholds[i]){curBandIdx=i;break;}}
	const targetIdx=Math.min(curBandIdx+3,bandThresholds.length-1);
	const maxR=bandThresholds[targetIdx];
	const YR=v=>yB-(v/maxR)*(yB-yT);

	// Diff sum Y (bars capped at 40% chart height)
	const diffVals=Object.values(weekDiff);
	const maxSum=diffVals.length?Math.max(...diffVals):1;
	const YS=v=>yB-(v/maxSum)*(yB-yT)*0.4;

	// Now week
	const nowEpoch=frh.length?frh[frh.length-1].epoch:(pts.length?pts[pts.length-1].epoch:mE);
	const nowWk=Math.floor((nowEpoch-mE)/WEEK);

	let s='<svg width="100%" height="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';

	// Rating band backgrounds (AtCoder colors)
	const bands=[[0,'#808080'],[400,'#804000'],[800,'#008000'],[1200,'#00c0c0'],[1600,'#0000ff'],[2000,'#c0c000'],[2400,'#ff8000'],[2800,'#ff0000']];
	for(let i=0;i<bands.length;i++){const lo=bands[i][0],hi=i+1<bands.length?bands[i+1][0]:maxR,col=bands[i][1];if(hi<=0||lo>=maxR)continue;const y1=YR(Math.min(hi,maxR)),y2=YR(Math.max(lo,0));if(y2<=yT||y1>=yB)continue;const cy1=Math.max(y1,yT),cy2=Math.min(y2,yB);s+='<rect x="'+xL+'" y="'+cy1.toFixed(1)+'" width="'+(xR-xL)+'" height="'+(cy2-cy1).toFixed(1)+'" fill="'+col+'" opacity="0.06"/>';}

	// Future zone
	const futX=xL+(nowWk+1)*colW;
	s+='<rect x="'+futX.toFixed(1)+'" y="'+yT+'" width="'+(xR-futX).toFixed(1)+'" height="'+(yB-yT)+'" fill="#020404" opacity="0.5"/>';

	// Grid (rating)

function renderSkillGraph(d) {
	const sg = d.skill_graph || {};
	const nodes = sg.nodes || [];
	const tiers = sg.tiers || [];
	if (!nodes.length) return '<div style="text-align:center;color:var(--dim);padding-top:20px">No data</div>';

	const byId = {};
	nodes.forEach(n => byId[n.id] = n);

	// Radial layout — 親の近くに子を配置、重ならないよう角度範囲を分配
	const W = 600, H = 600, cx = W/2, cy = H/2;
	const radii = [0, 105, 195, 275];
	const tierGroups = {};
	nodes.forEach(n => { (tierGroups[n.tier] = tierGroups[n.tier] || []).push(n); });

	const pos = {};
	const center = nodes.find(n => n.tier === 0);
	if (center) pos[center.id] = {x: cx, y: cy};

	// Tier 1: 均等配置
	const t1 = tierGroups[1] || [];
	const t1Angles = {};
	t1.forEach((n, i) => {
		const angle = (i / t1.length) * Math.PI * 2 - Math.PI/2;
		t1Angles[n.id] = angle;
		pos[n.id] = {x: cx + Math.cos(angle) * radii[1], y: cy + Math.sin(angle) * radii[1]};
	});

	// 祖先のtier-1ノードを見つける
	function findT1Ancestor(n) {
		let cur = n;
		while (cur && cur.tier > 1) cur = byId[cur.parent];
		if (cur && cur.tier === 1) return cur.id;
		return null; // parentがbase(tier 0)の場合
	}

	// 深さ計算
	function getDepth(n) {
		let d = 0, cur = n;
		while (cur.parent && byId[cur.parent]) { d++; cur = byId[cur.parent]; }
		return d;
	}
	const maxDepth = Math.max(...nodes.map(getDepth));
	const depthRadii = [];
	for (let i = 0; i <= maxDepth; i++) {
		depthRadii[i] = 30 + i * (260 / maxDepth);
	}

	// サブツリーの葉数に応じた角度幅でDFS配置
	const childMap = {};
	nodes.forEach(n => { if (n.parent) (childMap[n.parent] = childMap[n.parent] || []).push(n.id); });

	// 各ノードの子孫の葉数を計算
	const leafCount = {};
	function countLeaves(id) {
		if (!childMap[id]) { leafCount[id] = 1; return 1; }
		let sum = 0;
		childMap[id].forEach(cid => sum += countLeaves(cid));
		leafCount[id] = sum;
		return sum;
	}
	countLeaves('base');
	const totalLeaves = leafCount['base'];

	// DFS で角度範囲を分配
	const nodeAngles = {};
	function layoutSubtree(id, angleStart, angleEnd) {
		const node = byId[id];
		if (!node || node.tier === 0) {
			// centerノードは固定
		} else {
			const mid = (angleStart + angleEnd) / 2;
			nodeAngles[id] = mid;
			const r = depthRadii[getDepth(node)];
			pos[id] = {x: cx + Math.cos(mid) * r, y: cy + Math.sin(mid) * r};
		}
		if (!childMap[id]) return;
		const children = childMap[id];
		let cursor = angleStart;
		children.forEach(cid => {
			const weight = leafCount[cid] / leafCount[id];
			const childEnd = cursor + weight * (angleEnd - angleStart);
			layoutSubtree(cid, cursor, childEnd);
			cursor = childEnd;
		});
	}
	layoutSubtree('base', -Math.PI/2, Math.PI * 3/2);

	const tierColor = {};
	tiers.forEach(t => tierColor[t.tier] = t.color);
	const nodeStroke = '#4a8a8a'; // 統一ノード枠色

	let s = '<svg width="100%" height="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
	s += '<defs>';
	// 各ティアゾーンのグラデーション（中心から外へフェード）
	tiers.forEach(t => {
		if (t.tier === 0) return;
		const inner = radii[t.tier - 1] || 0;
		const outer = radii[t.tier];
		const mid = (inner + outer) / 2;
		// ゾーンの中間が最も濃く、境界でフェード
		s += '<radialGradient id="zone'+t.tier+'" cx="50%" cy="50%" r="'+(outer/Math.max(W,H)*100).toFixed(1)+'%">';
		s += '<stop offset="'+(inner/outer*100).toFixed(0)+'%" stop-color="'+t.color+'" stop-opacity="0"/>';
		s += '<stop offset="'+(mid/outer*100).toFixed(0)+'%" stop-color="'+t.color+'" stop-opacity="0.08"/>';
		s += '<stop offset="100%" stop-color="'+t.color+'" stop-opacity="0.03"/>';
		s += '</radialGradient>';
	});
	s += '</defs>';

	// ティアゾーン（大きな同心円の塗り）— 外側から描画
	[3, 2, 1].forEach(t => {
		const outer = radii[t] + 20;
		const col = tierColor[t] || '#1a1a1a';
		s += '<circle cx="'+cx+'" cy="'+cy+'" r="'+outer+'" fill="'+col+'" opacity="0.06"/>';
	});
	// ティア境界線
	[1, 2, 3].forEach(t => {
		const r = (radii[t-1] + radii[t]) / 2 + 10;
		const col = tierColor[t] || '#1a1a1a';
		s += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.25"/>';
	});
	// ティアラベル（境界線上）
	tiers.forEach(t => {
		if (t.tier === 0) return;
		const r = (radii[t.tier-1] + radii[t.tier]) / 2 + 10;
		s += '<text x="'+(cx+r-5)+'" y="'+(cy-4)+'" fill="'+t.color+'" font-size="7" font-family="monospace" opacity="0.5">'+t.label+'</text>';
	});

	// Edges
	nodes.forEach(n => {
		if (!n.parent || !pos[n.id] || !pos[n.parent]) return;
		const p1 = pos[n.parent], p2 = pos[n.id];
		const prog = n.progress ? n.progress[0] / n.progress[1] : 0;
		const opacity = prog > 0 ? 0.4 + prog * 0.6 : 0.1;
		s += '<line x1="'+p1.x.toFixed(1)+'" y1="'+p1.y.toFixed(1)+'" x2="'+p2.x.toFixed(1)+'" y2="'+p2.y.toFixed(1)+'" stroke="'+nodeStroke+'" stroke-width="0.8" opacity="'+opacity.toFixed(2)+'"/>';
	});

	// Nodes
	nodes.forEach(n => {
		const p = pos[n.id];
		if (!p) return;
		const prog = n.progress ? n.progress[0] / n.progress[1] : 0;
		const done = n.progress && n.progress[0] >= n.progress[1];
		const r = n.tier === 0 ? 16 : 12;

		// Glow for completed
		if (done) {
			s += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(r+4)+'" fill="'+nodeStroke+'" opacity="0.12"/>';
		}

		// Node circle — 統一色
		s += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+r+'" fill="'+(prog > 0 ? '#081414' : '#040a0a')+'" stroke="'+nodeStroke+'" stroke-width="'+(done ? 1.5 : 0.6)+'" opacity="'+(prog > 0 ? 1 : 0.35)+'"/>';

		// Progress arc
		if (prog > 0 && !done) {
			const angle = prog * Math.PI * 2;
			const x1 = p.x, y1 = p.y - r;
			const x2 = p.x + Math.sin(angle) * r;
			const y2 = p.y - Math.cos(angle) * r;
			const large = angle > Math.PI ? 1 : 0;
			s += '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+' 1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+nodeStroke+'" stroke-width="2" opacity="0.9"/>';
		}

		// Check mark
		if (done) {
			s += '<text x="'+p.x.toFixed(1)+'" y="'+(p.y+1).toFixed(1)+'" fill="'+nodeStroke+'" font-size="9" text-anchor="middle" dominant-baseline="middle">✓</text>';
		}

		// Label — 中心から離れる方向に配置
		const dx = p.x - cx, dy = p.y - cy;
		const dist = Math.sqrt(dx*dx + dy*dy) || 1;
		const labelDist = r + 8;
		const lx = n.tier === 0 ? p.x : p.x + dx/dist * labelDist;
		const ly = n.tier === 0 ? p.y + r + 9 : p.y + dy/dist * labelDist + 3;
		const anchor = n.tier === 0 ? 'middle' : (dx > 20 ? 'start' : dx < -20 ? 'end' : 'middle');
		s += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" fill="'+(prog > 0 ? '#8ababa' : '#2a4a4a')+'" font-size="7" text-anchor="'+anchor+'" font-family="monospace">'+n.label+'</text>';

		// Progress text
		if (n.progress && !done) {
			s += '<text x="'+p.x.toFixed(1)+'" y="'+(p.y+3).toFixed(1)+'" fill="'+(prog > 0 ? '#8ababa' : '#2a4a4a')+'" font-size="6" text-anchor="middle" font-family="monospace">'+n.progress[0]+'/'+n.progress[1]+'</text>';
		}
	});

	s += '</svg>';
	return s;
}

function renderInsight(d) {
	let h = '';
	if (d.insight) {
		h += '<div class="insight-box" style="background:var(--dbg-insight)">'
			+ '<div style="display:flex;justify-content:space-between;font-size:var(--fs-sm);color:#3a8a5a">'
			+ '<span>最近の洞察</span><span style="color:#2a6a4a">'+(d.insight.tag||'')+' · diff'+(d.insight.difficulty||'')+'</span></div>'
			+ '<div class="insight-text">'+d.insight.text+'</div></div>';
	}
	return h;
}

function renderAchievements(d) {
	if (!d.achievements) return '';
	const a = d.achievements;
	let h = '<div class="achievement-bar" style="height:100%;background:var(--dbg-achieve)">'
		+ '<span style="font-size:var(--fs-2xs);color:var(--muted);white-space:nowrap">実績 '+a.unlocked+'/'+a.total+'</span>'
		+ '<div class="achievement-grid">';
	(a.list||[]).forEach(m => {
		const c = m.status==='gold'?' gold':m.status==='new'?' fresh':m.status==='lock'?' locked':'';
		h += '<div class="achievement-item'+c+'"><div class="achievement-icon">'+m.icon+'</div><div class="achievement-label">'+m.label+'</div></div>';
	});
	h += '</div></div>';
	return h;
}

function hydrate() {
	const d = window.__CP_DATA;
	if (!d) return;
	const vp = window.__VP || {w:1080, h:675};
	// bodyを直接gridコンテナとして使用（mainブランチと同じ構造）
	document.body.innerHTML = renderHUD(d)
		+'<div class="main">'
		+'<div class="col-left">'
			+'<div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">'+renderPlayerStatus(d)+'</div>'
			+'<div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">'+renderWAQueue(d)+'</div>'
			+'<div class="panel accent-cyan" data-label="RECOMMEND" style="flex:1;background:var(--dbg-recommend);min-height:0;overflow:hidden"><div class="panel-inner">'+renderRecommend(d)+'</div></div>'
			+'<div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">'+renderInsight(d)+'</div>'
		+'</div>'
		+'<div class="col-right">'
			+'<div class="col-right-top">'
				+renderDifficultyLog(d)
				+'<div class="panel" data-label="SKILL GRAPH" style="overflow:hidden;background:var(--dbg-skillgraph)"><div class="panel-inner" style="display:flex;flex:1;min-height:0">'+renderSkillGraph(d)+'</div></div>'
			+'</div>'
			+'<div class="col-right-bottom">'
				+'<div class="panel" data-label="TAG AC RATE" style="background:var(--dbg-tagrate)"><div class="panel-inner">'+renderTagACRate(d)+'</div></div>'
				+'<div class="panel" data-label="成長比較" style="background:var(--dbg-compare)"><div class="panel-inner">'+renderCompare(d)+'</div></div>'
				+'<div class="panel accent-amber" data-label="STREAK" style="background:var(--dbg-streak)"><div class="panel-inner">'+renderStreakCalendar(d)+'</div></div>'
				+'<div class="panel" data-label="SPEED" style="background:var(--dbg-speed)"><div class="panel-inner">'+renderSpeedBars(d)+'</div></div>'
				+'<div class="panel accent-cyan" data-label="CONTEST" style="background:var(--dbg-speed)"><div class="panel-inner">'+renderContestList(d)+'</div></div>'
			+'</div>'
		+'</div>'
		+'</div>';

	const fc=(d.contests||[])[0];
	if(fc){const bt=document.getElementById('boss-timer');if(bt)setInterval(()=>{const diff=fc.start_epoch-Date.now()/1000;if(diff<=0){bt.textContent='LIVE';return;}bt.textContent=Math.floor(diff/3600)+':'+String(Math.floor((diff%3600)/60)).padStart(2,'0')+':'+String(Math.floor(diff%60)).padStart(2,'0');},1000);}
}
</script>
