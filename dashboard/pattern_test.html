<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<style>
body { background: #020404; color: #8ababa; font-family: monospace; margin: 0; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 100vw; height: 100vh; box-sizing: border-box; }
.panel { background: #061010; border: 0.5px solid #1a3a3a; padding: 8px; overflow: hidden; display: flex; flex-direction: column; }
.panel h3 { margin: 0 0 6px 0; font-size: 12px; color: #4abacc; }
svg { flex: 1; }
</style>
</head>
<body>
<script>
// Dummy data (same as dashboard)
const points = [];
const base = 1763269200; // 2025-11-16
for (let i = 0; i < 90; i++) {
  const epoch = base + i * 2 * 86400;
  const trend = 200 + i * 8;
  const noise = (Math.random() - 0.4) * 300;
  points.push({ epoch, difficulty: Math.max(50, Math.round(trend + noise)) });
}
const nowEpoch = points[points.length - 1].epoch;
const avg = [];
for (let i = 0; i < points.length; i++) {
  const cutoff = points[i].epoch - 7 * 86400;
  const win = points.slice(0, i + 1).filter(p => p.epoch >= cutoff);
  avg.push({ epoch: points[i].epoch, avg: Math.round(win.reduce((s, p) => s + p.difficulty, 0) / win.length) });
}
// Projections
const lastAvg = avg[avg.length - 1].avg;
const twoWeek = avg.filter(a => a.epoch >= nowEpoch - 14 * 86400);
const slope = twoWeek.length >= 2 ? (twoWeek[twoWeek.length-1].avg - twoWeek[0].avg) / ((twoWeek[twoWeek.length-1].epoch - twoWeek[0].epoch) / 86400) : 2;
const projections = [
  { scenario: 'optimistic', mult: 1.5, color: '#4abe7a' },
  { scenario: 'maintain', mult: 1.0, color: '#d8a64e' },
  { scenario: 'pessimistic', mult: 0.3, color: '#2a5a5a' }
];

const M = 1400, cr = 438;
const allEpochs = points.map(p => p.epoch);
projections.forEach(pr => { for (let w = 1; w <= 13; w++) allEpochs.push(nowEpoch + w * 7 * 86400); });
const mE = Math.min(...allEpochs), xE = Math.max(...allEpochs), R = xE - mE || 1;

function makeCoords(W, H, pad) {
  const xL = pad, xR = W - 10, yT = 10, yB = H - 16;
  const X = e => xL + (e - mE) / R * (xR - xL);
  const Y = v => yB - (v / M) * (yB - yT);
  return { xL, xR, yT, yB, X, Y };
}

function grid(s, c, W, H) {
  [1200, 800, 400].forEach(v => {
    const y = c.Y(v);
    s += '<line x1="'+c.xL+'" y1="'+y+'" x2="'+c.xR+'" y2="'+y+'" stroke="#0c1c1c" stroke-width="0.5"/>';
    s += '<text x="'+(c.xL-2)+'" y="'+(y+3)+'" fill="#1a3a3a" font-size="8" text-anchor="end">'+v+'</text>';
  });
  // Rating line
  const ry = c.Y(cr);
  s += '<line x1="'+c.xL+'" y1="'+ry+'" x2="'+c.xR+'" y2="'+ry+'" stroke="#4a2a00" stroke-width="0.5" stroke-dasharray="3,3"/>';
  // Now line
  const nx = c.X(nowEpoch);
  s += '<line x1="'+nx+'" y1="'+c.yT+'" x2="'+nx+'" y2="'+c.yB+'" stroke="#2a5a5a" stroke-width="0.5" stroke-dasharray="2,3"/>';
  s += '<rect x="'+nx+'" y="'+c.yT+'" width="'+(c.xR-nx)+'" height="'+(c.yB-c.yT)+'" fill="#040808" opacity="0.4"/>';
  return s;
}

function projLines(s, c) {
  projections.forEach(pr => {
    let polyPts = c.X(nowEpoch).toFixed(1)+','+c.Y(lastAvg).toFixed(1);
    for (let w = 1; w <= 13; w++) {
      const ep = nowEpoch + w * 7 * 86400;
      const val = Math.max(0, Math.min(M, lastAvg + slope * w * 7 * pr.mult));
      polyPts += ' '+c.X(ep).toFixed(1)+','+c.Y(val).toFixed(1);
    }
    s += '<polyline points="'+polyPts+'" fill="none" stroke="'+pr.color+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>';
  });
  return s;
}

// ========== Pattern A: Scatter + Line (current) ==========
function patternA() {
  const W=560,H=180; const c=makeCoords(W,H,40);
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  s=grid(s,c,W,H);
  s+='<g opacity="0.3">';points.forEach(p=>{s+='<circle cx="'+c.X(p.epoch).toFixed(1)+'" cy="'+c.Y(p.difficulty).toFixed(1)+'" r="2" fill="#3a7a5a"/>';});s+='</g>';
  if(avg.length>1)s+='<polyline points="'+avg.map(a=>c.X(a.epoch).toFixed(1)+','+c.Y(a.avg).toFixed(1)).join(' ')+'" fill="none" stroke="#4abacc" stroke-width="1.5"/>';
  s=projLines(s,c);
  s+='</svg>';return s;
}

// ========== Pattern B: Weekly candlestick ==========
function patternB() {
  const W=560,H=180; const c=makeCoords(W,H,40);
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  s=grid(s,c,W,H);
  // Group by week
  const weeks = {};
  points.forEach(p => {
    const wk = Math.floor((p.epoch - mE) / (7*86400));
    (weeks[wk] = weeks[wk] || []).push(p);
  });
  Object.entries(weeks).forEach(([wk, pts]) => {
    const midEpoch = pts.reduce((s,p)=>s+p.epoch,0)/pts.length;
    const diffs = pts.map(p=>p.difficulty);
    const mn = Math.min(...diffs), mx = Math.max(...diffs);
    const md = diffs.sort((a,b)=>a-b)[Math.floor(diffs.length/2)];
    const x = c.X(midEpoch);
    const barW = Math.max(3, (c.xR-c.xL)/(Object.keys(weeks).length+13)*0.7);
    // Wick (min-max)
    s+='<line x1="'+x+'" y1="'+c.Y(mx)+'" x2="'+x+'" y2="'+c.Y(mn)+'" stroke="#2a5a5a" stroke-width="1"/>';
    // Body (median dot)
    s+='<rect x="'+(x-barW/2)+'" y="'+c.Y(mx)+'" width="'+barW+'" height="'+Math.max(1,c.Y(mn)-c.Y(mx))+'" fill="#1a3a3a" opacity="0.6"/>';
    s+='<circle cx="'+x+'" cy="'+c.Y(md)+'" r="2.5" fill="#4abacc"/>';
  });
  s=projLines(s,c);
  s+='</svg>';return s;
}

// ========== Pattern C: Heatmap ==========
function patternC() {
  const W=560,H=180; const c=makeCoords(W,H,40);
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  // Grid labels only
  [1200,800,400].forEach(v=>{
    const y=c.Y(v);
    s+='<text x="'+(c.xL-2)+'" y="'+(y+3)+'" fill="#1a3a3a" font-size="8" text-anchor="end">'+v+'</text>';
  });
  const nx=c.X(nowEpoch);
  s+='<rect x="'+nx+'" y="'+c.yT+'" width="'+(c.xR-nx)+'" height="'+(c.yB-c.yT)+'" fill="#040808" opacity="0.4"/>';
  // Heatmap: weeks x difficulty bands
  const bandSize = 100;
  const numBands = Math.ceil(M / bandSize);
  const numWeeks = Math.ceil((xE - mE) / (7*86400));
  const cellW = (c.xR - c.xL) / numWeeks;
  const cellH = (c.yB - c.yT) / numBands;
  const heatmap = {};
  points.forEach(p => {
    const wk = Math.floor((p.epoch - mE) / (7*86400));
    const band = Math.floor(p.difficulty / bandSize);
    const key = wk+','+band;
    heatmap[key] = (heatmap[key]||0)+1;
  });
  const maxCount = Math.max(...Object.values(heatmap), 1);
  Object.entries(heatmap).forEach(([key, count]) => {
    const [wk, band] = key.split(',').map(Number);
    const x = c.xL + wk * cellW;
    const y = c.yB - (band + 1) * cellH;
    const intensity = count / maxCount;
    const r = Math.round(10 + intensity * 60);
    const g = Math.round(30 + intensity * 150);
    const b = Math.round(30 + intensity * 100);
    s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+cellW.toFixed(1)+'" height="'+cellH.toFixed(1)+'" fill="rgb('+r+','+g+','+b+')" opacity="0.9"/>';
  });
  // Moving average line on top
  if(avg.length>1)s+='<polyline points="'+avg.map(a=>c.X(a.epoch).toFixed(1)+','+c.Y(a.avg).toFixed(1)).join(' ')+'" fill="none" stroke="#4abacc" stroke-width="1.5" opacity="0.8"/>';
  s=projLines(s,c);
  s+='</svg>';return s;
}

// ========== Pattern D: Area chart with gradient ==========
function patternD() {
  const W=560,H=180; const c=makeCoords(W,H,40);
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4abacc" stop-opacity="0.3"/><stop offset="100%" stop-color="#4abacc" stop-opacity="0.02"/></linearGradient></defs>';
  s=grid(s,c,W,H);
  // Filled area under moving average
  if(avg.length>1){
    let areaPts=c.X(avg[0].epoch).toFixed(1)+','+c.yB;
    avg.forEach(a=>{areaPts+=' '+c.X(a.epoch).toFixed(1)+','+c.Y(a.avg).toFixed(1);});
    areaPts+=' '+c.X(avg[avg.length-1].epoch).toFixed(1)+','+c.yB;
    s+='<polygon points="'+areaPts+'" fill="url(#areaGrad)"/>';
    s+='<polyline points="'+avg.map(a=>c.X(a.epoch).toFixed(1)+','+c.Y(a.avg).toFixed(1)).join(' ')+'" fill="none" stroke="#4abacc" stroke-width="1.5"/>';
  }
  // Scatter as tiny dots
  s+='<g opacity="0.2">';points.forEach(p=>{s+='<circle cx="'+c.X(p.epoch).toFixed(1)+'" cy="'+c.Y(p.difficulty).toFixed(1)+'" r="1.5" fill="#8ababa"/>';});s+='</g>';
  // Projection as filled fan
  const pOpt=[], pPes=[];
  for(let w=1;w<=13;w++){
    const ep=nowEpoch+w*7*86400;
    pOpt.push({x:c.X(ep),y:c.Y(Math.min(M,lastAvg+slope*w*7*1.5))});
    pPes.push({x:c.X(ep),y:c.Y(Math.max(0,lastAvg+slope*w*7*0.3))});
  }
  let fanPts=c.X(nowEpoch).toFixed(1)+','+c.Y(lastAvg).toFixed(1);
  pOpt.forEach(p=>{fanPts+=' '+p.x.toFixed(1)+','+p.y.toFixed(1);});
  for(let i=pPes.length-1;i>=0;i--){fanPts+=' '+pPes[i].x.toFixed(1)+','+pPes[i].y.toFixed(1);}
  s+='<polygon points="'+fanPts+'" fill="#4abacc" opacity="0.08"/>';
  s=projLines(s,c);
  s+='</svg>';return s;
}

// Render all
const panels = [
  { title: 'A: Scatter + Line (現在)', fn: patternA },
  { title: 'B: Weekly Candlestick', fn: patternB },
  { title: 'C: Heatmap + Line', fn: patternC },
  { title: 'D: Area + Fan予測', fn: patternD }
];
panels.forEach(p => {
  const div = document.createElement('div');
  div.className = 'panel';
  div.innerHTML = '<h3>'+p.title+'</h3>'+p.fn();
  document.body.appendChild(div);
});
</script>
</body></html>
